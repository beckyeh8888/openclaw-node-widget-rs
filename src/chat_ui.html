<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenClaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Theme variables ─────────────────────────────────── */
:root, [data-theme="dark"] {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-sidebar: #0f0f23;
  --bg-bubble-user: #0084ff;
  --bg-bubble-agent: #2d2d44;
  --bg-input: #2d2d44;
  --bg-code: #0d0d1a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0b0;
  --text-muted: #888888;
  --text-dimmed: #666666;
  --border-color: #2d2d44;
  --border-light: #3d3d5c;
  --accent: #0084ff;
  --accent-hover: #0073e6;
  --link-color: #7eb8ff;
  --scrollbar-thumb: #3d3d5c;
  --search-highlight: rgba(255, 230, 0, 0.35);
  --mark-bg: #e6c300;
  --mark-color: #000;
}
[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f5f5f5;
  --bg-sidebar: #e8e8ec;
  --bg-bubble-user: #0084ff;
  --bg-bubble-agent: #e8e8e8;
  --bg-input: #f0f0f0;
  --bg-code: #f5f5f5;
  --text-primary: #1a1a1a;
  --text-secondary: #555555;
  --text-muted: #666666;
  --text-dimmed: #999999;
  --border-color: #e0e0e0;
  --border-light: #d0d0d0;
  --accent: #0084ff;
  --accent-hover: #0073e6;
  --link-color: #0066cc;
  --scrollbar-thumb: #c0c0c0;
  --search-highlight: rgba(255, 230, 0, 0.5);
  --mark-bg: #ffe600;
  --mark-color: #000;
}

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: row;
}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar {
  width: 48px;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  border-right: 1px solid var(--border-color);
  flex-shrink: 0;
}
.nav-btn {
  width: 38px; height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s;
  color: var(--text-muted);
}
.nav-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
.nav-btn.active { background: var(--bg-primary); color: var(--text-primary); box-shadow: inset 3px 0 0 var(--accent); }

/* ── Main content area ───────────────────────────────── */
#mainContent {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Pages ───────────────────────────────────────────── */
.page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page.active { display: flex; }

/* ── Chat page (preserved) ───────────────────────────── */
#header {
  background: var(--bg-secondary);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
}
#sessionSelect {
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 3px 8px;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  max-width: 160px;
}
#sessionSelect option { background: var(--bg-input); }
.session-tabs {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  max-width: 200px;
  flex-shrink: 1;
}
.session-tabs::-webkit-scrollbar { height: 0; }
.session-tab {
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  background: var(--bg-bubble-agent);
  color: var(--text-secondary);
  border: 1px solid transparent;
  transition: background 0.15s, color 0.15s;
}
.session-tab:hover { color: var(--text-primary); background: var(--border-light); }
.session-tab.active { color: #fff; background: var(--accent); }
#connectionStatus {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.status-connected {
  background: rgba(68, 255, 68, 0.15);
  color: #44ff44;
}
.status-disconnected {
  background: rgba(255, 68, 68, 0.15);
  color: #ff4444;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }

.agent-name {
  font-size: 11px;
  color: var(--link-color);
  margin-bottom: 2px;
  padding-left: 12px;
}
.bubble {
  padding: 9px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.45;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: var(--bg-bubble-user);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.agent .bubble {
  background: var(--bg-bubble-agent);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
}
.bubble img {
  display: block;
  max-width: 280px;
  max-height: 200px;
  border-radius: 10px;
  margin-bottom: 4px;
  cursor: pointer;
}
.msg.agent .bubble { white-space: normal; }
.msg.agent .bubble pre {
  background: var(--bg-code);
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  white-space: pre-wrap;
  margin: 6px 0;
}
.msg.agent .bubble code {
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 13px;
}
.msg.agent .bubble pre code {
  background: none;
  padding: 0;
}
.msg.agent .bubble a {
  color: var(--link-color);
  text-decoration: underline;
}
.msg.agent .bubble ul, .msg.agent .bubble ol {
  margin: 4px 0;
  padding-left: 20px;
}
.msg.agent .bubble li {
  margin: 2px 0;
}
.msg.agent .bubble p {
  margin: 4px 0;
}
.streaming-cursor::after {
  content: '\25CA';
  animation: blink 0.8s infinite;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
.ts {
  font-size: 10px;
  color: var(--text-dimmed);
  margin-top: 2px;
  padding: 0 12px;
}
.message-usage {
  font-size: 10px;
  color: var(--text-dimmed);
  text-align: right;
  margin-top: 1px;
  padding: 0 12px;
}

#typingIndicator {
  display: none;
  align-self: flex-start;
  padding: 10px 16px;
  background: var(--bg-bubble-agent);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  margin: 0 16px 4px;
  flex-shrink: 0;
}
#typingIndicator.visible { display: flex; gap: 4px; align-items: center; }
.dot {
  width: 6px; height: 6px;
  background: var(--text-muted);
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dimmed);
  font-size: 14px;
}

#imageOverlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
#imageOverlay.visible { display: flex; }
#imageOverlay img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

#imagePreview {
  display: none;
  background: var(--bg-secondary);
  padding: 6px 16px;
  border-top: 1px solid var(--border-color);
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#imagePreview img { max-height: 60px; border-radius: 6px; }
.remove-preview {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  border-radius: 50%;
  width: 20px; height: 20px;
  cursor: pointer;
  font-size: 12px;
  line-height: 20px;
  text-align: center;
}

#inputBar {
  background: var(--bg-secondary);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}
#uploadBtn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px;
  opacity: 0.6;
  transition: opacity 0.2s;
}
#uploadBtn:hover { opacity: 1; }
#messageInput {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 20px;
  padding: 7px 14px;
  color: var(--text-primary);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#messageInput:focus { border-color: var(--accent); }
#messageInput::placeholder { color: var(--text-dimmed); }
#messageInput:disabled { opacity: 0.4; cursor: not-allowed; }
#sendBtn {
  background: var(--accent);
  border: none;
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
#sendBtn:hover { background: var(--accent-hover); }
#sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }
#micBtn {
  background: none;
  border: none;
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  font-size: 16px;
  color: var(--text-muted);
  flex-shrink: 0;
}
#micBtn:hover { color: var(--text-primary); background: rgba(255,255,255,0.1); }
#micBtn.recording { color: #ff4444; animation: pulse-mic 1s infinite; }
@keyframes pulse-mic {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
#recordingLabel {
  font-size: 11px;
  color: #ff4444;
  display: none;
  white-space: nowrap;
}

/* ── Dashboard page ──────────────────────────────────── */
.dash-header {
  background: var(--bg-secondary);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.dash-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.dash-scroll::-webkit-scrollbar { width: 5px; }
.dash-scroll::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.plugin-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.plugin-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px;
  min-width: 140px;
  flex: 1;
}
.plugin-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.connected { background: #44ff44; }
.status-dot.disconnected { background: #ff4444; }
.status-dot.reconnecting { background: #ffaa00; }
.status-dot.error { background: #ff4444; }
.plugin-card-name { font-size: 14px; font-weight: 600; }
.plugin-card-type { font-size: 11px; color: var(--text-muted); }
.plugin-card-latency { font-size: 12px; color: var(--link-color); margin-top: 2px; }
.plugin-card-uptime { font-size: 11px; color: var(--text-dimmed); margin-top: 1px; }
.plugin-card-status-text { font-size: 11px; margin-top: 2px; }
.plugin-card-status-text.connected { color: #44ff44; }
.plugin-card-status-text.disconnected { color: #ff4444; }

.dash-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.dash-section-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.dash-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}
.dash-row-label { color: var(--text-muted); }
.dash-row-value { color: var(--text-primary); }

/* Sparkline chart */
.sparkline {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 40px;
  margin-top: 6px;
}
.sparkline-bar {
  display: inline-block;
  width: 3px;
  background: var(--accent);
  border-radius: 1px;
  min-height: 2px;
  transition: height 0.2s;
}
.sparkline-stats {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ── Logs page ───────────────────────────────────────── */
.logs-header {
  background: var(--bg-secondary);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.logs-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
}
.logs-filter {
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 3px 8px;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.logs-filter option { background: var(--bg-input); }
.logs-search {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 8px;
  padding: 4px 10px;
  color: var(--text-primary);
  font-size: 12px;
  outline: none;
}
.logs-search::placeholder { color: var(--text-dimmed); }

.logs-scroll {
  flex: 1;
  overflow-y: auto;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 12px;
  line-height: 1.6;
}
.logs-scroll::-webkit-scrollbar { width: 5px; }
.logs-scroll::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }

.log-entry {
  padding: 2px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid rgba(45,45,68,0.3);
  cursor: pointer;
  transition: background 0.1s;
}
.log-entry:hover { background: rgba(255,255,255,0.03); }
.log-ts { color: var(--text-dimmed); white-space: nowrap; flex-shrink: 0; }
.log-level { font-weight: 600; width: 40px; flex-shrink: 0; text-align: center; }
.log-level.INFO { color: #44ff44; }
.log-level.WARN { color: #ffaa00; }
.log-level.ERROR { color: #ff4444; }
.log-source { color: var(--link-color); white-space: nowrap; flex-shrink: 0; }
.log-msg { color: var(--text-secondary); word-break: break-all; flex: 1; }

.logs-footer {
  background: var(--bg-secondary);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border-color);
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.logs-footer-btn {
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  color: var(--text-primary);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.logs-footer-btn:hover { background: var(--border-light); }

/* ── Settings page ──────────────────────────────────── */
.settings-header {
  background: var(--bg-secondary);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-color);
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.settings-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.settings-scroll::-webkit-scrollbar { width: 5px; }
.settings-scroll::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.settings-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.settings-section-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.settings-add-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-add-btn:hover { background: var(--accent-hover); }

.plugin-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,45,68,0.3);
}
.plugin-list-item:last-child { border-bottom: none; }
.plugin-list-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.plugin-list-dot.active { background: #44ff44; }
.plugin-list-dot.inactive { background: #888; }
.plugin-list-info { flex: 1; min-width: 0; }
.plugin-list-name { font-size: 13px; font-weight: 600; }
.plugin-list-type { font-size: 11px; color: var(--text-muted); }
.plugin-list-url { font-size: 11px; color: var(--text-dimmed); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plugin-list-actions { display: flex; gap: 4px; flex-shrink: 0; }
.plugin-list-btn {
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  color: var(--text-primary);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.plugin-list-btn:hover { background: var(--border-light); }
.plugin-list-btn.danger { color: #ff4444; }
.plugin-list-btn.danger:hover { background: #442222; }

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
}
.settings-row-label { color: var(--text-muted); }
.settings-select {
  background: var(--bg-input);
  color: var(--text-primary);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.settings-checkbox {
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: var(--accent);
}
.settings-footer {
  background: var(--bg-secondary);
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}
.settings-footer-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  border-radius: 6px;
  padding: 5px 16px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-footer-btn:hover { background: var(--accent-hover); }
.settings-footer-btn.secondary {
  background: var(--bg-input);
  border: 1px solid var(--border-light);
}
.settings-footer-btn.secondary:hover { background: var(--border-light); }

/* ── TTS controls ────────────────────────────────────── */
.bubble-actions {
  display: none;
  position: absolute;
  top: 4px;
  right: -32px;
  gap: 2px;
}
.msg.agent:hover .bubble-actions { display: flex; }
.msg.agent { position: relative; }
.tts-btn {
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  width: 24px; height: 24px;
  font-size: 12px;
  cursor: pointer;
  color: #aaa;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.tts-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  }
};

var lang = "en";
var connected = false;
var attachment = null;
var currentPage = "chat";
var allLogEntries = [];
var logAutoScroll = true;

function t(k) {
  return (I18N[lang] && I18N[lang][k]) || I18N.en[k] || k;
}

function applyI18n() {
  document.getElementById("headerChat").textContent = t("chat");
  document.getElementById("messageInput").placeholder = t("chat_placeholder");
  document.getElementById("uploadBtn").title = t("chat_upload");
  var es = document.getElementById("emptyState");
  if (es) es.textContent = t("chat_empty");
  var st = document.getElementById("connectionStatus");
  st.textContent = connected ? t("chat_connected") : t("chat_not_connected");
}

// ── Navigation ──────────────────────────────────────────
function navigateTo(page) {
  currentPage = page;
  var pages = document.querySelectorAll(".page");
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove("active");
  var btns = document.querySelectorAll(".nav-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");

  var target = document.getElementById("page-" + page);
  if (target) target.classList.add("active");
  var btn = document.querySelector('.nav-btn[data-page="' + page + '"]');
  if (btn) btn.classList.add("active");

  window.ipc.postMessage(JSON.stringify({ type: "navigate", page: page }));
  if (page === "settings") {
    window.ipc.postMessage(JSON.stringify({ type: "getSettings" }));
  }
}

var navBtns = document.querySelectorAll(".nav-btn");
for (var i = 0; i < navBtns.length; i++) {
  navBtns[i].addEventListener("click", function() { navigateTo(this.dataset.page); });
}

// ── Chat functions (preserved) ──────────────────────────
function fmtTime(d) {
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + ":" + (m < 10 ? "0" : "") + m + " " + ampm;
}

function scrollBottom() {
  var c = document.getElementById("messages");
  requestAnimationFrame(function() { c.scrollTop = c.scrollHeight; });
}

HL_KEYWORDS.sh = HL_KEYWORDS.bash;
// js/ts aliases
HL_KEYWORDS.js = HL_KEYWORDS.javascript;
HL_KEYWORDS.ts = HL_KEYWORDS.typescript;
HL_KEYWORDS.tsx = HL_KEYWORDS.typescript;
HL_KEYWORDS.jsx = HL_KEYWORDS.javascript;
HL_KEYWORDS.py = HL_KEYWORDS.python;
HL_KEYWORDS.rs = HL_KEYWORDS.rust;

function highlightCode(code, lang) {
  lang = (lang || '').toLowerCase();
  if (!lang || !HL_KEYWORDS[lang]) {
    // For JSON, just highlight strings and numbers
    if (lang === 'json') {
      return code
        .replace(/(\"(?:[^\"\\]|\\.)*\")\s*:/g, '<span class="hl-type">$1</span>:')
        .replace(/:\s*(\"(?:[^\"\\]|\\.)*\")/g, ': <span class="hl-string">$1</span>')
        .replace(/:\s*(\d+\.?\d*)/g, ': <span class="hl-number">$1</span>')
        .replace(/:\s*(true|false|null)\b/g, ': <span class="hl-keyword">$1</span>');
    }
    return code; // Unknown language — no highlighting
  }

  // Tokenize: extract comments, strings, and the rest
  var tokens = [];
  var re = /(\/\/.*$|\/\*[\s\S]*?\*\/|#.*$|<!--[\s\S]*?-->)|(\"(?:[^\"\\]|\\.)*\"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/gm;
  var lastIdx = 0;
  var m;
  while ((m = re.exec(code)) !== null) {
    if (m.index > lastIdx) tokens.push({ type: 'code', text: code.slice(lastIdx, m.index) });
    if (m[1]) tokens.push({ type: 'comment', text: m[1] });
    else if (m[2]) tokens.push({ type: 'string', text: m[2] });
    lastIdx = re.lastIndex;
  }
  if (lastIdx < code.length) tokens.push({ type: 'code', text: code.slice(lastIdx) });

  return tokens.map(function(tok) {
    if (tok.type === 'comment') return '<span class="hl-comment">' + tok.text + '</span>';
    if (tok.type === 'string') return '<span class="hl-string">' + tok.text + '</span>';
    // Highlight keywords and numbers in code segments
    var t = tok.text;
    var kwRe = HL_KEYWORDS[lang];
    if (kwRe) {
      kwRe.lastIndex = 0;
      t = t.replace(kwRe, '<span class="hl-keyword">$1</span>');
    }
    t = t.replace(/\b(\d+\.?\d*([eE][+-]?\d+)?)\b/g, '<span class="hl-number">$1</span>');
    return t;
  }).join('');
}

// ── Markdown renderer (vanilla JS, no external libs) ────
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  // Escape HTML first to prevent XSS
  var s = escapeHtml(text);

  // Code blocks: ```lang\n...\n```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var cls = lang ? ' class="language-' + lang + '"' : '';
    var highlighted = highlightCode(code, lang);
    return '<pre><code' + cls + '>' + highlighted + '</code></pre>';
  });
  // Code blocks without trailing newline
  s = s.replace(/```(\w*)([\s\S]*?)```/g, function(_, lang, code) {
    var cls = lang ? ' class="language-' + lang + '"' : '';
    var highlighted = highlightCode(code, lang);
    return '<pre><code' + cls + '>' + highlighted + '</code></pre>';
  });

  // Split by code blocks to avoid processing markdown inside them
  var parts = s.split(/(<pre><code[^>]*>[\s\S]*?<\/code><\/pre>)/g);
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].indexOf('<pre><code') === 0) continue;
    var p = parts[i];

    // Inline code
    p = p.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    p = p.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic
    p = p.replace(/\*(.+?)\*/g, '<em>$1</em>');
    p = p.replace(/_(.+?)_/g, '<em>$1</em>');
    // Links
    p = p.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Headings (render as bold, not actual headings — too big in chat)
    p = p.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    p = p.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    p = p.replace(/^# (.+)$/gm, '<strong>$1</strong>');
    // Unordered lists
    p = p.replace(/(?:^|\n)((?:[-*] .+\n?)+)/g, function(_, block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^[-*] /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });
    // Ordered lists
    p = p.replace(/(?:^|\n)((?:\d+\. .+\n?)+)/g, function(_, block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    // Paragraphs (double newline)
    p = p.replace(/\n\n+/g, '</p><p>');
    // Single newlines to <br>
    p = p.replace(/\n/g, '<br>');

    parts[i] = p;
  }
  return '<p>' + parts.join('') + '</p>';
}

// ── Streaming state ─────────────────────────────────────
var pendingStreams = {};

function streamStart(data) {
  var c = document.getElementById("messages");
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "none";

  var w = document.createElement("div");
  w.className = "msg agent";
  w.id = "stream-" + data.id;

  if (data.agentName) {
    var n = document.createElement("div");
    n.className = "agent-name";
    n.textContent = data.agentName;
    w.appendChild(n);
  }

  var b = document.createElement("div");
  b.className = "bubble streaming-cursor";
  b.setAttribute("data-raw", "");
  w.appendChild(b);

  c.appendChild(w);
  pendingStreams[data.id] = { el: w, raw: "" };
  scrollBottom();
}

var _streamScrollTimer = null;
function streamChunk(data) {
  var ps = pendingStreams[data.id];
  if (!ps) return;
  // Gateway sends full accumulated text — REPLACE, not append
  ps.raw = data.text;
  var b = ps.el.querySelector(".bubble");
  if (b) {
    var prev = b.getAttribute("data-raw") || "";
    if (ps.raw !== prev) {
      b.setAttribute("data-raw", ps.raw);
      b.textContent = ps.raw;
    }
  }
  // Debounce scroll to reduce flicker
  if (_streamScrollTimer) clearTimeout(_streamScrollTimer);
  _streamScrollTimer = setTimeout(function() { scrollBottom(); _streamScrollTimer = null; }, 80);
}

function streamEnd(data) {
  var ps = pendingStreams[data.id];
  if (!ps) return;
  var b = ps.el.querySelector(".bubble");
  if (b) {
    b.classList.remove("streaming-cursor");
    b.innerHTML = renderMarkdown(ps.raw);
  }
  // Add timestamp
  var ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = fmtTime(new Date());
  ps.el.appendChild(ts);
  delete pendingStreams[data.id];
  scrollBottom();
}

var AGENT_ICONS = {
  "openclaw": "\u{1f916}",
  "ollama": "\u{1f999}",
  "openai-compatible": "\u{1f4a1}",
  "n8n": "\u{26a1}",
  "mcp": "\u{1f50c}"
};

var activeAgentId = "main";
var agentsData = [];

function initAgents(agents) {
  agentsData = agents || [];
  var sel = document.getElementById("agentSelect");
  sel.innerHTML = "";
  if (!agents || agents.length === 0) {
    sel.style.display = "none";
    return;
  }
  for (var i = 0; i < agents.length; i++) {
    var a = agents[i];
    var opt = document.createElement("option");
    opt.value = a.id;
    opt.setAttribute("data-type", a.type || "openclaw");
    opt.setAttribute("data-session-key", a.sessionKey || a.id);
    var icon = AGENT_ICONS[a.type] || "\u{1f916}";
    opt.textContent = icon + " " + a.name;
    if (a.id === activeAgentId) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.style.display = "";
  sel.onchange = function() {
    var selected = sel.options[sel.selectedIndex];
    if (!selected) return;
    var agentId = selected.value;
    var agentType = selected.getAttribute("data-type") || "openclaw";
    var sessionKey = selected.getAttribute("data-session-key") || agentId;
    activeAgentId = agentId;
    window.ipc.postMessage(JSON.stringify({
      type: "switchAgent",
      agentId: agentId,
      agentType: agentType,
      sessionKey: sessionKey
    }));
  };
}

// Backward compat: initPluginSelect falls through to initAgents
function initPluginSelect(plugins) {
  if (!plugins || plugins.length === 0) {
    document.getElementById("agentSelect").style.display = "none";
    return;
  }
  var agents = plugins.map(function(p) {
    return {
      id: p.id,
      name: p.name,
      type: p.type,
      sessionKey: "main"
    };
  });
  initAgents(agents);
}

function clearChat() {
  var c = document.getElementById("messages");
  if (c) {
    while (c.firstChild) c.removeChild(c.firstChild);
  }
  pendingStreams = {};
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "";
}

function addMessage(m) {
  var c = document.getElementById("messages");
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "none";

  var w = document.createElement("div");
  w.className = "msg " + (m.sender === "user" ? "user" : "agent");

  if (m.sender === "agent" && m.agentName) {
    var n = document.createElement("div");
    n.className = "agent-name";
    n.textContent = m.agentName;
    w.appendChild(n);
  }

  var b = document.createElement("div");
  b.className = "bubble";

  var mediaUrl = m.mediaUrl || m.imageUrl || null;
  var mediaType = m.mediaType || "";
  var isImageMedia = mediaUrl && (
    mediaType.indexOf("image/") === 0 ||
    /\\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(mediaUrl)
  );

  if (isImageMedia) {
    var img = document.createElement("img");
    img.src = mediaUrl;
    img.loading = "lazy";
    img.onclick = function() { openOverlay(this.src); };
    b.appendChild(img);
  } else if (mediaUrl) {
    var fileLink = document.createElement("a");
    fileLink.href = mediaUrl;
    fileLink.textContent = m.mediaName || "Attachment";
    fileLink.target = "_blank";
    fileLink.rel = "noopener";
    b.appendChild(fileLink);
  }
  if (m.text) {
    if (m.sender === "agent") {
      b.innerHTML += renderMarkdown(m.text);
    } else {
      var txt = document.createElement("span");
      txt.textContent = m.text;
      b.appendChild(txt);
    }
  }
  w.appendChild(b);

  var ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = fmtTime(new Date());
  w.appendChild(ts);

  if (m.usage && m.sender === "agent") {
    var usageEl = document.createElement("div");
    usageEl.className = "message-usage";
    var parts = [];
    if (m.usage.output_tokens) parts.push(m.usage.output_tokens + " tokens");
    if (m.usage.duration_ms) parts.push((m.usage.duration_ms / 1000).toFixed(1) + "s");
    if (parts.length > 0) {
      usageEl.textContent = parts.join(" \u00b7 ");
      w.appendChild(usageEl);
    }
  }

  c.appendChild(w);
  scrollBottom();
}

function setConnected(v) {
  connected = v;
  var st = document.getElementById("connectionStatus");
  var inp = document.getElementById("messageInput");
  if (v) {
    st.textContent = t("chat_connected");
    st.className = "status-connected";
    inp.disabled = false;
  } else {
    st.textContent = t("chat_not_connected");
    st.className = "status-disconnected";
    inp.disabled = true;
  }
  updateSend();
}

function setSessions(list) {
  var sel = document.getElementById("sessionSelect");
  var cur = sel.value;
  sel.innerHTML = '<option value="">main</option>';
  for (var i = 0; i < list.length; i++) {
    var o = document.createElement("option");
    o.value = list[i].key;
    o.textContent = list[i].name;
    sel.appendChild(o);
  }
  if (cur) sel.value = cur;
  // Also update session tabs
  updateSessionTabs(list, cur || "main");
}

var activeSessionKey = "main";

function updateSessionTabs(sessions, selected) {
  var container = document.getElementById("sessionTabs");
  container.innerHTML = "";
  var keys = sessions && sessions.length ? sessions : [{ key: "main", name: "main" }];
  for (var i = 0; i < keys.length; i++) {
    var tab = document.createElement("span");
    tab.className = "session-tab" + (keys[i].key === selected ? " active" : "");
    tab.textContent = keys[i].name;
    tab.setAttribute("data-key", keys[i].key);
    tab.addEventListener("click", (function(key) {
      return function() { switchSession(key); };
    })(keys[i].key));
    container.appendChild(tab);
  }
  activeSessionKey = selected;
}

function switchSession(key) {
  activeSessionKey = key;
  // Update tab UI
  var tabs = document.querySelectorAll(".session-tab");
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle("active", tabs[i].getAttribute("data-key") === key);
  }
  // Also sync hidden select
  document.getElementById("sessionSelect").value = key;
  // Tell Rust to switch session
  var agentSelEl = document.getElementById("agentSelect");
  var selectedOpt = agentSelEl.options[agentSelEl.selectedIndex];
  if (selectedOpt) {
    var agType = selectedOpt.getAttribute("data-type") || "openclaw";
    window.ipc.postMessage(JSON.stringify({
      type: "switchAgent",
      agentId: agentSelEl.value || activeAgentId,
      agentType: agType,
      sessionKey: key
    }));
  }
}

function loadHistory(data) {
  var c = document.getElementById("messages");
  c.innerHTML = '<div class="empty-state" id="emptyState">' + t("chat_empty") + '</div>';
  if (data.messages && data.messages.length) {
    document.getElementById("emptyState").style.display = "none";
    for (var i = 0; i < data.messages.length; i++) addMessage(data.messages[i]);
  }
}

function setTyping(v) {
  var el = document.getElementById("typingIndicator");
  if (v) { el.classList.add("visible"); scrollBottom(); }
  else el.classList.remove("visible");
}

function updateSend() {
  var inp = document.getElementById("messageInput");
  document.getElementById("sendBtn").disabled =
    !connected || (!inp.value.trim() && !attachment);
}

function openOverlay(src) {
  document.getElementById("overlayImg").src = src;
  document.getElementById("imageOverlay").classList.add("visible");
}
function closeOverlay() {
  document.getElementById("imageOverlay").classList.remove("visible");
  document.getElementById("overlayImg").src = "";
}

function clearPreview() {
  attachment = null;
  document.getElementById("imagePreview").style.display = "none";
  document.getElementById("previewImg").src = "";
  updateSend();
}

function sendMsg() {
  var inp = document.getElementById("messageInput");
  var text = inp.value.trim();
  if (!text && !attachment) return;
  if (!connected) return;

  // Get session key from active agent (agent switcher), fallback to session selector
  var agentSel = document.getElementById("agentSelect");
  var activeOpt = agentSel && agentSel.selectedOptions[0];
  var sk = (activeOpt && activeOpt.getAttribute("data-session-key")) || 
           document.getElementById("sessionSelect").value || null;
  var msg = { type: "send", message: text, sessionKey: sk };
  if (attachment) msg.attachments = [attachment];

  window.ipc.postMessage(JSON.stringify(msg));

  var display = { sender: "user", text: text };
  if (attachment) {
    display.imageUrl = "data:" + attachment.mimeType + ";base64," + attachment.data;
  }
  addMessage(display);

  inp.value = "";
  clearPreview();
  setTyping(true);
  updateSend();
}

function handleFile(f) {
  if (!f || !f.type.startsWith("image/")) return;
  var r = new FileReader();
  r.onload = function(e) {
    var b64 = e.target.result.split(",")[1];
    attachment = { data: b64, filename: f.name, mimeType: f.type };
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("imagePreview").style.display = "flex";
    updateSend();
  };
  r.readAsDataURL(f);
}

// ── Dashboard functions ─────────────────────────────────
function fmtUptime(secs) {
  if (!secs && secs !== 0) return "—";
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + "h " + m + "m";
  return m + "m";
}

function updateDashboard(data) {
  if (!data) return;

  // Plugin cards
  var container = document.getElementById("pluginCards");
  var dashEmpty = document.getElementById("dashEmpty");
  if (data.plugins && data.plugins.length > 0) {
    if (dashEmpty) dashEmpty.style.display = "none";
    container.innerHTML = "";
    for (var i = 0; i < data.plugins.length; i++) {
      var p = data.plugins[i];
      var card = document.createElement("div");
      card.className = "plugin-card";
      var healthHtml = '';
      if (p.health) {
        healthHtml = '<div class="plugin-card-latency">ping: ' + p.health.latency_ms + 'ms</div>';
        if (p.health.error) {
          healthHtml += '<div style="font-size:11px;color:#ff4444;">' + escHtml(p.health.error) + '</div>';
        }
      } else if (p.latency_ms != null) {
        healthHtml = '<div class="plugin-card-latency">' + p.latency_ms + 'ms</div>';
      }
      var uptimeHtml = '';
      if (p.uptime_pct != null) {
        uptimeHtml = '<div class="plugin-card-uptime">\u2191 ' + p.uptime_pct.toFixed(1) + '% uptime</div>';
      } else if (p.uptime_secs != null) {
        uptimeHtml = '<div class="plugin-card-uptime">\u2191 ' + fmtUptime(p.uptime_secs) + '</div>';
      }
      card.innerHTML =
        '<div class="plugin-card-header">' +
          '<span class="status-dot ' + (p.status || 'disconnected') + '"></span>' +
          '<span class="plugin-card-name">' + escHtml(p.icon + ' ' + p.name) + '</span>' +
        '</div>' +
        '<div class="plugin-card-type">' + escHtml(p.plugin_type) + '</div>' +
        healthHtml +
        uptimeHtml +
        '<div class="plugin-card-status-text ' + (p.status || 'disconnected') + '">' +
          (p.status === 'connected' ? 'Connected' : p.status === 'reconnecting' ? 'Reconnecting...' : 'Disconnected') +
        '</div>';
      container.appendChild(card);
    }
  } else {
    if (dashEmpty) dashEmpty.style.display = "flex";
  }

  // Node info
  document.getElementById("dashNodeName").textContent = data.node_name || "—";
  document.getElementById("dashPlatform").textContent = data.platform || "—";
  document.getElementById("dashUptime").textContent = fmtUptime(data.uptime_secs);
  document.getElementById("dashVersion").textContent = data.version || "—";

  // Sparkline
  var sparkEl = document.getElementById("sparkline");
  var history = data.latency_history || [];
  if (history.length > 0) {
    var maxVal = Math.max.apply(null, history) || 1;
    sparkEl.innerHTML = "";
    for (var j = 0; j < history.length; j++) {
      var bar = document.createElement("span");
      bar.className = "sparkline-bar";
      bar.style.height = Math.max(2, (history[j] / maxVal) * 36) + "px";
      bar.title = history[j] + "ms";
      sparkEl.appendChild(bar);
    }
    var sum = 0;
    for (var k = 0; k < history.length; k++) sum += history[k];
    document.getElementById("latencyAvg").textContent = Math.round(sum / history.length) + "ms";
    document.getElementById("latencyMax").textContent = Math.max.apply(null, history) + "ms";
  }
}

// ── Logs functions ──────────────────────────────────────
function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function updateLogs(entries) {
  if (!entries) return;
  allLogEntries = entries;
  renderLogs();
}

function renderLogs() {
  var container = document.getElementById("logEntries");
  var levelFilter = document.getElementById("logLevelFilter").value;
  var search = document.getElementById("logSearch").value.toLowerCase();

  var filtered = allLogEntries.filter(function(e) {
    if (levelFilter && e.level !== levelFilter) return false;
    if (search && e.message.toLowerCase().indexOf(search) === -1 &&
        e.source.toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  // Check if user has scrolled up
  var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 30;

  container.innerHTML = "";
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var row = document.createElement("div");
    row.className = "log-entry";
    row.setAttribute("data-idx", i);
    row.innerHTML =
      '<span class="log-ts">' + escHtml(e.timestamp) + '</span>' +
      '<span class="log-level ' + escHtml(e.level) + '">' + escHtml(e.level) + '</span>' +
      '<span class="log-source">[' + escHtml(e.source) + ']</span>' +
      '<span class="log-msg">' + escHtml(e.message) + '</span>';
    row.addEventListener("click", (function(entry) {
      return function() { copyLogEntry(entry); };
    })(e));
    container.appendChild(row);
  }

  document.getElementById("logCount").textContent = filtered.length + " entries";

  // Auto-scroll if was at bottom
  if (wasAtBottom || logAutoScroll) {
    requestAnimationFrame(function() {
      container.scrollTop = container.scrollHeight;
    });
  }
}

function copyLogEntry(entry) {
  var text = entry.timestamp + " " + entry.level + " [" + entry.source + "] " + entry.message;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  }
}

// Log scroll detection: stop auto-scroll when user scrolls up
document.getElementById("logEntries").addEventListener("scroll", function() {
  var el = this;
  logAutoScroll = el.scrollHeight - el.scrollTop - el.clientHeight < 30;
});

var settingsPlugins = [];
var settingsGeneral = { language: "auto", autoStart: false };

function renderPluginList() {

function updateModalFields() {

function closePluginModal() {

function savePluginFromModal() {
  var name = document.getElementById("modalPluginName").value.trim();
  if (!name) return;
  var plugin = {
    type: document.getElementById("modalPluginType").value,
    name: name,
    url: document.getElementById("modalPluginUrl").value.trim() || null,
    token: document.getElementById("modalPluginToken").value.trim() || null,
    apiKey: document.getElementById("modalPluginApiKey").value.trim() || null,
    model: document.getElementById("modalPluginModel").value.trim() || null,
    webhookUrl: document.getElementById("modalPluginWebhook").value.trim() || null,
    pollUrl: document.getElementById("modalPluginPoll").value.trim() || null,
    systemPrompt: document.getElementById("modalPluginSystemPrompt").value.trim() || null
  };

  // If editing and name changed, delete the old one
  var origName = document.getElementById("modalEditOriginalName").value;
  if (origName && origName !== name) {
    window.ipc.postMessage(JSON.stringify({ type: "deletePlugin", name: origName }));
  }

  window.ipc.postMessage(JSON.stringify({ type: "savePlugin", plugin: plugin }));

  // Update local state
  var found = false;
  for (var i = 0; i < settingsPlugins.length; i++) {
    if (settingsPlugins[i].name === (origName || name)) {
      settingsPlugins[i] = plugin;
      found = true;

  if (!found) settingsPlugins.push(plugin);
  renderPluginList();
  closePluginModal();

function deletePlugin(idx) {

  window.ipc.postMessage(JSON.stringify({ type: "deletePlugin", name: p.name }));

// ── TTS (Web Speech API) ─────────────────────────────────
var ttsEnabled = true;
var ttsAutoRead = false;
var ttsRate = 1.0;
var ttsVoice = "auto";
var currentLang = "en";

function speakText(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  var plain = text.replace(/<[^>]+>/g, '').replace(/```[\s\S]*?```/g, '').replace(/[#*_~`>]/g, '').trim();
  if (!plain) return;
  var utterance = new SpeechSynthesisUtterance(plain);
  utterance.lang = currentLang === 'zh-tw' ? 'zh-TW' : currentLang === 'zh-cn' ? 'zh-CN' : 'en-US';
  utterance.rate = ttsRate;
  if (ttsVoice !== "auto") {
    var voices = speechSynthesis.getVoices();
    for (var i = 0; i < voices.length; i++) {
      if (voices[i].name === ttsVoice) { utterance.voice = voices[i]; break; }
    }
  }
  document.getElementById("ttsStopBtn").style.display = "inline-block";
  utterance.onend = function() { document.getElementById("ttsStopBtn").style.display = "none"; };
  utterance.onerror = function() { document.getElementById("ttsStopBtn").style.display = "none"; };
  speechSynthesis.speak(utterance);
}

function stopTts() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  document.getElementById("ttsStopBtn").style.display = "none";
}

document.getElementById("ttsAutoBtn").addEventListener("click", function() {
  ttsAutoRead = !ttsAutoRead;
  this.classList.toggle("active", ttsAutoRead);
  window.ipc.postMessage(JSON.stringify({ type: "setTtsAutoRead", autoRead: ttsAutoRead }));
});

// Patch addMessage to add TTS button and auto-read
var _origAddMessage = addMessage;
addMessage = function(m) {
  _origAddMessage(m);
  if (m.sender === "agent" && ttsEnabled) {
    var msgs = document.getElementById("messages");
    var lastMsg = msgs.lastElementChild;
    if (lastMsg && lastMsg.classList.contains("agent")) {
      var actions = document.createElement("div");
      actions.className = "bubble-actions";
      var btn = document.createElement("button");
      btn.className = "tts-btn";
      btn.textContent = "🔊";
      btn.title = "Read aloud";
      btn.addEventListener("click", (function(txt) {
        return function() { speakText(txt); };
      })(m.text));
      actions.appendChild(btn);
      lastMsg.appendChild(actions);
      if (ttsAutoRead) speakText(m.text);
    }
  }
};

// Patch streamEnd to add TTS button and auto-read for streamed messages
var _origStreamEnd = streamEnd;
streamEnd = function(data) {
  var ps = pendingStreams[data.id];
  var rawText = ps ? ps.raw : "";
  _origStreamEnd(data);
  if (ttsEnabled && rawText) {
    var el = document.getElementById("stream-" + data.id);
    if (el) {
      var actions = document.createElement("div");
      actions.className = "bubble-actions";
      var btn = document.createElement("button");
      btn.className = "tts-btn";
      btn.textContent = "🔊";
      btn.title = "Read aloud";
      btn.addEventListener("click", function() { speakText(rawText); });
      actions.appendChild(btn);
      el.appendChild(actions);
      if (ttsAutoRead) speakText(rawText);
    }
  }
};

// ── Slash commands ───────────────────────────────────────
var slashCommands = [
  { cmd: "/clear", desc: "Clear conversation" },
  { cmd: "/export", desc: "Export as Markdown" },
  { cmd: "/session", desc: "Switch session", hasArg: true },
  { cmd: "/plugin", desc: "Switch plugin", hasArg: true },
  { cmd: "/agent", desc: "Switch agent", hasArg: true },
  { cmd: "/model", desc: "Set model", hasArg: true },
  { cmd: "/system", desc: "Set system prompt", hasArg: true },
  { cmd: "/help", desc: "Show commands" },
  { cmd: "/voice", desc: "Toggle voice input" },
  { cmd: "/tts", desc: "Toggle auto-read" },
  { cmd: "/theme", desc: "Set theme (dark/light/auto)", hasArg: true },
  { cmd: "/pin", desc: "Toggle always-on-top" }
];
var cmdSelectedIdx = 0;

function showCommandMenu(query) {
  var menu = document.getElementById("commandMenu");
  var filtered = slashCommands.filter(function(c) {
    return c.cmd.indexOf("/" + query) === 0;
  });
  if (!filtered.length) { hideCommandMenu(); return; }
  cmdSelectedIdx = Math.min(cmdSelectedIdx, filtered.length - 1);
  menu.innerHTML = "";
  for (var i = 0; i < filtered.length; i++) {
    var item = document.createElement("div");
    item.className = "cmd-item" + (i === cmdSelectedIdx ? " selected" : "");
    item.innerHTML = '<span class="cmd-name">' + escHtml(filtered[i].cmd) + '</span><span class="cmd-desc">' + escHtml(filtered[i].desc) + '</span>';
    item.setAttribute("data-cmd", filtered[i].cmd);
    item.setAttribute("data-has-arg", filtered[i].hasArg ? "1" : "");
    item.addEventListener("click", (function(c) {
      return function() { selectCommand(c); };
    })(filtered[i]));
    menu.appendChild(item);
  }
  menu.classList.add("visible");
}

function hideCommandMenu() {
  document.getElementById("commandMenu").classList.remove("visible");
  cmdSelectedIdx = 0;
}

function selectCommand(c) {
  var inp = document.getElementById("messageInput");
  if (c.hasArg) {
    inp.value = c.cmd + " ";
    inp.focus();
  } else {
    inp.value = "";
    executeCommand(c.cmd, "");
  }
  hideCommandMenu();
}

function executeCommand(cmd, arg) {
  switch (cmd) {
    case "/clear":
      document.getElementById("messages").innerHTML = '<div class="empty-state" id="emptyState">' + t("chat_empty") + '</div>';
      window.ipc.postMessage(JSON.stringify({ type: "clearConversation" }));
      break;
    case "/export":
      exportMarkdown();
      break;
    case "/session":
      if (arg) switchSession(arg.trim());
      break;
    case "/plugin":
      if (arg) {
        var agentSel = document.getElementById("agentSelect");
        agentSel.value = arg.trim();
        agentSel.onchange && agentSel.onchange();
      }
      break;
    case "/agent":
      if (arg) {
        var agSel = document.getElementById("agentSelect");
        // Try to match by id or name substring
        var target = arg.trim().toLowerCase();
        for (var ai = 0; ai < agSel.options.length; ai++) {
          var o = agSel.options[ai];
          if (o.value.toLowerCase() === target || o.textContent.toLowerCase().indexOf(target) !== -1) {
            agSel.selectedIndex = ai;
            agSel.onchange && agSel.onchange();
            break;
          }
        }
      }
      break;
    case "/model":
      if (arg) window.ipc.postMessage(JSON.stringify({ type: "setModel", model: arg.trim() }));
      break;
    case "/system":
      if (arg) window.ipc.postMessage(JSON.stringify({ type: "setSystemPrompt", prompt: arg.trim() }));
      break;
    case "/help":
      addMessage({ sender: "agent", agentName: "System", text: slashCommands.map(function(c) { return c.cmd + " — " + c.desc; }).join("\n") });
      break;
    case "/tts":
      ttsAutoRead = !ttsAutoRead;
      document.getElementById("ttsAutoBtn").classList.toggle("active", ttsAutoRead);
      addMessage({ sender: "agent", agentName: "System", text: "Auto-read " + (ttsAutoRead ? "enabled" : "disabled") });
      break;
    case "/theme":
      if (arg) {
        var theme = arg.trim().toLowerCase();
        if (theme === "dark" || theme === "light" || theme === "auto") {
          applyTheme(theme);
          window.ipc.postMessage(JSON.stringify({ type: "setTheme", theme: theme }));
          addMessage({ sender: "agent", agentName: "System", text: "Theme set to " + theme });
        } else {
          addMessage({ sender: "agent", agentName: "System", text: "Invalid theme. Use: dark, light, or auto" });
        }
      }
      break;
    case "/pin":
      togglePin();
      break;
    default:
      addMessage({ sender: "agent", agentName: "System", text: "Unknown command: " + cmd });
  }
}

// Override sendMsg to intercept slash commands
var _origSendMsg = sendMsg;
sendMsg = function() {
  var inp = document.getElementById("messageInput");
  var text = inp.value.trim();
  if (text.startsWith("/")) {
    var parts = text.match(/^(\/\S+)\s*([\s\S]*)$/);
    if (parts) {
      inp.value = "";
      hideCommandMenu();
      updateSend();
      executeCommand(parts[1], parts[2]);
      return;
    }
  }
  _origSendMsg();
};

// ── Chat export ──────────────────────────────────────────
function exportMarkdown() {
  var msgs = document.getElementById("messages");
  var bubbles = msgs.querySelectorAll(".msg");
  var md = "# Chat Export - " + new Date().toISOString() + "\n\n";
  for (var i = 0; i < bubbles.length; i++) {
    var el = bubbles[i];
    if (el.classList.contains("empty-state")) continue;
    var isUser = el.classList.contains("user");
    var nameEl = el.querySelector(".agent-name");
    var sender = isUser ? "**You**" : ("**" + (nameEl ? nameEl.textContent : "Agent") + "**");
    var bubble = el.querySelector(".bubble");
    var rawText = bubble ? (bubble.getAttribute("data-raw") || bubble.textContent || "") : "";
    var tsEl = el.querySelector(".ts");
    var ts = tsEl ? tsEl.textContent : "";
    md += "### " + sender + (ts ? " (" + ts + ")" : "") + "\n" + rawText.trim() + "\n\n";
  }
  window.ipc.postMessage(JSON.stringify({ type: "export", format: "markdown", content: md }));
  addMessage({ sender: "agent", agentName: "System", text: "Chat exported to Downloads folder." });
}

// ── Message Search ──────────────────────────────────────
var searchMatches = [];
var searchCurrentIdx = -1;

function toggleSearch() {
  var bar = document.getElementById("searchBar");
  if (bar.classList.contains("visible")) {
    closeSearch();
  } else {
    bar.classList.add("visible");
    document.getElementById("searchInput").focus();
  }
}

function closeSearch() {
  document.getElementById("searchBar").classList.remove("visible");
  document.getElementById("searchInput").value = "";
  clearHighlights();
  searchMatches = [];
  searchCurrentIdx = -1;
  document.getElementById("searchCounter").textContent = "";
}

function clearHighlights() {
  var marks = document.querySelectorAll("mark.search-highlight");
  for (var i = 0; i < marks.length; i++) {
    var parent = marks[i].parentNode;
    parent.replaceChild(document.createTextNode(marks[i].textContent), marks[i]);
    parent.normalize();
  }
}

function searchMessages(query) {
  clearHighlights();
  searchMatches = [];
  searchCurrentIdx = -1;
  if (!query) {
    document.getElementById("searchCounter").textContent = "";
    return;
  }
  var lowerQuery = query.toLowerCase();
  var bubbles = document.querySelectorAll("#messages .bubble");
  for (var i = 0; i < bubbles.length; i++) {
    highlightInElement(bubbles[i], lowerQuery);
  }
  searchMatches = Array.from(document.querySelectorAll("mark.search-highlight"));
  if (searchMatches.length > 0) {
    searchCurrentIdx = 0;
    updateSearchCounter();
    scrollToMatch();
  } else {
    document.getElementById("searchCounter").textContent = "0 of 0";
  }
}

function highlightInElement(el, query) {
  var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
  var textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);
  for (var i = 0; i < textNodes.length; i++) {
    var node = textNodes[i];
    var text = node.textContent;
    var lower = text.toLowerCase();
    var idx = lower.indexOf(query);
    if (idx === -1) continue;
    var frag = document.createDocumentFragment();
    var lastIdx = 0;
    while (idx !== -1) {
      if (idx > lastIdx) frag.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
      var mark = document.createElement("mark");
      mark.className = "search-highlight";
      mark.textContent = text.substring(idx, idx + query.length);
      frag.appendChild(mark);
      lastIdx = idx + query.length;
      idx = lower.indexOf(query, lastIdx);
    }
    if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.substring(lastIdx)));
    node.parentNode.replaceChild(frag, node);
  }
}

function updateSearchCounter() {
  var counter = document.getElementById("searchCounter");
  if (searchMatches.length === 0) {
    counter.textContent = "0 of 0";
  } else {
    counter.textContent = (searchCurrentIdx + 1) + " of " + searchMatches.length;
  }
  // Update current highlight
  for (var i = 0; i < searchMatches.length; i++) {
    searchMatches[i].classList.toggle("current", i === searchCurrentIdx);
  }
}

function scrollToMatch() {
  if (searchCurrentIdx >= 0 && searchCurrentIdx < searchMatches.length) {
    searchMatches[searchCurrentIdx].scrollIntoView({ block: "center", behavior: "smooth" });
  }
}

function searchNext() {
  if (searchMatches.length === 0) return;
  searchCurrentIdx = (searchCurrentIdx + 1) % searchMatches.length;
  updateSearchCounter();
  scrollToMatch();
}

function searchPrev() {
  if (searchMatches.length === 0) return;
  searchCurrentIdx = (searchCurrentIdx - 1 + searchMatches.length) % searchMatches.length;
  updateSearchCounter();
  scrollToMatch();
}

document.getElementById("searchInput").addEventListener("input", function() {
  searchMessages(this.value.trim());
});

document.getElementById("searchInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") { e.preventDefault(); searchNext(); }
  if (e.key === "Escape") { e.preventDefault(); closeSearch(); }
});

// Ctrl+F / Cmd+F opens search
document.addEventListener("keydown", function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === "f") {
    e.preventDefault();
    if (currentPage === "chat") toggleSearch();
  }
  if (e.key === "Escape") {
    var bar = document.getElementById("searchBar");
    if (bar.classList.contains("visible")) closeSearch();
  }
});

// ── Theme ───────────────────────────────────────────────
var currentTheme = "auto";

function applyTheme(theme) {
  currentTheme = theme;
  if (theme === "auto") {
    var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
  } else {
    document.documentElement.setAttribute("data-theme", theme);
  }
  // Sync settings dropdown if visible
  var sel = document.getElementById("settingsTheme");
  if (sel) sel.value = theme;
}

// Listen for system theme changes when in auto mode
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function() {
  if (currentTheme === "auto") applyTheme("auto");
});

// ── Pin (Always-on-Top) ─────────────────────────────────
var isPinned = false;

function togglePin() {
  isPinned = !isPinned;
  document.getElementById("pinBtn").classList.toggle("active", isPinned);
  window.ipc.postMessage(JSON.stringify({ type: "pin", pinned: isPinned }));
  addMessage({ sender: "agent", agentName: "System", text: "Always-on-top " + (isPinned ? "enabled" : "disabled") });
}

// ── Init ────────────────────────────────────────────────
function init(data) {
  lang = data.lang || "en";
  connected = data.connected || false;
  applyI18n();
  setConnected(connected);
  if (data.sessions && data.sessions.length) setSessions(data.sessions);
  if (data.selectedSession) document.getElementById("sessionSelect").value = data.selectedSession;
  if (data.activeSessionKey) activeSessionKey = data.activeSessionKey;
  if (data.messages && data.messages.length) {
    document.getElementById("emptyState").style.display = "none";
    for (var i = 0; i < data.messages.length; i++) addMessage(data.messages[i]);
  }
  if (data.waitingForReply) setTyping(true);
  if (data.dashboard) updateDashboard(data.dashboard);
  if (data.logs && data.logs.length) updateLogs(data.logs);
  if (data.tts) {
    ttsEnabled = data.tts.enabled !== false;
    ttsAutoRead = data.tts.auto_read || false;
    ttsRate = data.tts.rate || 1.0;
    ttsVoice = data.tts.voice || "auto";
    if (ttsAutoRead) document.getElementById("ttsAutoBtn").classList.add("active");
    if (!ttsEnabled) document.getElementById("ttsAutoBtn").style.display = "none";
  }
  currentLang = data.lang || "en";
  if (data.theme) applyTheme(data.theme);
  if (data.alwaysOnTop) {
    isPinned = true;
    document.getElementById("pinBtn").classList.add("active");
  }
  if (data.activeAgentId) activeAgentId = data.activeAgentId;
  if (data.agents && data.agents.length) {
    initAgents(data.agents);
  } else if (data.plugins) {
    initPluginSelect(data.plugins);
  }
  if (data.currentPage && data.currentPage !== "chat") navigateTo(data.currentPage);
  // Init session tabs with whatever sessions we have
  var sessionsForTabs = data.sessions && data.sessions.length ? data.sessions : [{ key: "main", name: "main" }];
  updateSessionTabs(sessionsForTabs, data.activeSessionKey || "main");
}

document.getElementById("messageInput").addEventListener("input", function(e) {
  updateSend();
  var val = e.target.value;
  if (val.startsWith("/") && !val.includes(" ")) {
    showCommandMenu(val.slice(1));
  } else {
    hideCommandMenu();
  }
});
document.getElementById("messageInput").addEventListener("keydown", function(e) {
  var menu = document.getElementById("commandMenu");
  if (!menu.classList.contains("visible")) return;
  var items = menu.querySelectorAll(".cmd-item");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    cmdSelectedIdx = Math.min(cmdSelectedIdx + 1, items.length - 1);
    for (var i = 0; i < items.length; i++) items[i].classList.toggle("selected", i === cmdSelectedIdx);
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    cmdSelectedIdx = Math.max(cmdSelectedIdx - 1, 0);
    for (var i = 0; i < items.length; i++) items[i].classList.toggle("selected", i === cmdSelectedIdx);
  } else if (e.key === "Tab") {
    e.preventDefault();
    if (items[cmdSelectedIdx]) {
      var cmd = items[cmdSelectedIdx].getAttribute("data-cmd");
      var hasArg = items[cmdSelectedIdx].getAttribute("data-has-arg");
      document.getElementById("messageInput").value = cmd + (hasArg ? " " : "");
      hideCommandMenu();
      if (!hasArg) { sendMsg(); }
    }
  }
});
document.getElementById("uploadBtn").addEventListener("click", function() {
  document.getElementById("fileInput").click();
});
document.getElementById("fileInput").addEventListener("change", function(e) {
  if (e.target.files.length) handleFile(e.target.files[0]);
  e.target.value = "";
});
document.getElementById("sessionSelect").addEventListener("change", function() {

});

// ── Voice Input ────────────────────────────────────────
var _mediaRecorder = null;
var _audioChunks = [];
var _isRecording = false;
var _recordingTimeout = null;

function startRecording() {
  if (_isRecording) { stopRecording(); return; }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    _audioChunks = [];
    _mediaRecorder = new MediaRecorder(stream, { mimeType: "audio/webm" });
    _mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) _audioChunks.push(e.data); };
    _mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(_audioChunks, { type: "audio/webm" });
      var reader = new FileReader();
      reader.onloadend = function() {
        var base64 = reader.result.split(",")[1] || "";
        if (base64) {
          window.ipc.postMessage(JSON.stringify({ type: "voice", audio: base64 }));
        }
      };
      reader.readAsDataURL(blob);
      setRecordingUI(false);
    };
    _mediaRecorder.start();
    _isRecording = true;
    setRecordingUI(true);
    // Max 30 seconds
    _recordingTimeout = setTimeout(function() { if (_isRecording) stopRecording(); }, 30000);
  }).catch(function(err) {
    console.warn("Microphone access denied:", err);
  });
}

function stopRecording() {
  if (_mediaRecorder && _isRecording) {
    _isRecording = false;
    clearTimeout(_recordingTimeout);
    _mediaRecorder.stop();
  }
}

function setRecordingUI(on) {
  var btn = document.getElementById("micBtn");
  var label = document.getElementById("recordingLabel");
  if (on) {
    btn.classList.add("recording");
    label.style.display = "inline";
  } else {
    btn.classList.remove("recording");
    label.style.display = "none";
  }
}

function onVoiceTranscription(text) {
  if (text) {
    var input = document.getElementById("messageInput");
    input.value = text;
    input.focus();
    updateSend();
  }
}

// Mic button: click to toggle, hold for push-to-talk
(function() {
  var btn = document.getElementById("micBtn");
  var holdTimer = null;
  var wasHold = false;
  btn.addEventListener("mousedown", function() {
    wasHold = false;
    holdTimer = setTimeout(function() { wasHold = true; startRecording(); }, 300);
  });
  btn.addEventListener("mouseup", function() {
    clearTimeout(holdTimer);
    if (wasHold) { stopRecording(); }
    else { startRecording(); }
  });
  btn.addEventListener("mouseleave", function() {
    clearTimeout(holdTimer);
    if (wasHold && _isRecording) stopRecording();
  });
})();

// ── Clipboard Paste Image ────────────────────────────────
document.addEventListener('paste', function(e) {
  var items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (var i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image/') === 0) {
      var blob = items[i].getAsFile();
      if (!blob) continue;
      var reader = new FileReader();
      var mimeType = items[i].type;
      reader.onload = function(ev) {
        var base64 = ev.target.result.split(',')[1];
        attachment = { data: base64, filename: 'clipboard.png', mimeType: mimeType };
        document.getElementById('previewImg').src = ev.target.result;
        document.getElementById('imagePreview').style.display = 'flex';
        updateSend();
      };
      reader.readAsDataURL(blob);
      e.preventDefault();
      return;
    }
  }
});

function getInstalledPluginNames() {
    return settingsPlugins.map(function(p) { return p.name; });
}

function renderStore(filter) {
    var grid = document.getElementById("storeGrid");
    grid.innerHTML = "";
    var installed = getInstalledPluginNames();
    var query = (filter || "").toLowerCase();
    for (var i = 0; i < pluginPresets.length; i++) {
        var preset = pluginPresets[i];
        if (query && preset.name.toLowerCase().indexOf(query) === -1 &&
            preset.desc.toLowerCase().indexOf(query) === -1) continue;
        var isInstalled = installed.indexOf(preset.name) !== -1;
        var card = document.createElement("div");
        card.className = "store-card";
        card.innerHTML =
            '<div class="store-card-icon">' + preset.icon + '</div>' +
            '<div class="store-card-name">' + escHtml(preset.name) + '</div>' +
            '<div class="store-card-desc">' + escHtml(preset.desc) + '</div>' +
            '<div class="store-card-actions">' +
                (isInstalled
                    ? '<span class="store-installed-badge">Installed</span>'
                    : '<button class="store-add-btn" data-preset-idx="' + i + '">+ Add</button>') +
            '</div>';
        grid.appendChild(card);
    }
    // Bind add buttons
    var addBtns = grid.querySelectorAll(".store-add-btn");
    for (var j = 0; j < addBtns.length; j++) {
        addBtns[j].addEventListener("click", (function(idx) {
            return function() { addFromStore(idx); };
        })(parseInt(addBtns[j].dataset.presetIdx, 10)));
    }
}

function addFromStore(idx) {
    var preset = pluginPresets[idx];
    if (!preset) return;
    var cfg = preset.config;
    // Open the existing plugin modal with pre-filled values
    var existing = {
        type: cfg.type,
        name: preset.name,
        url: cfg.url || "",
        token: cfg.token || "",
        apiKey: cfg.api_key || "",
        model: cfg.model || "",
        webhookUrl: cfg.webhook_url || "",
        pollUrl: "",
        systemPrompt: ""
    };
    openPluginModal(existing);
}
