<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenClaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #1a1a2e;
  color: #fff;
  height: 100%;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: row;
}

/* ── Sidebar ─────────────────────────────────────────── */
#sidebar {
  width: 48px;
  background: #0f0f23;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 0;
  gap: 4px;
  border-right: 1px solid #2d2d44;
  flex-shrink: 0;
}
.nav-btn {
  width: 38px; height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s;
  color: #888;
}
.nav-btn:hover { background: #1a1a2e; color: #fff; }
.nav-btn.active { background: #1a1a2e; color: #fff; box-shadow: inset 3px 0 0 #0084ff; }

/* ── Main content area ───────────────────────────────── */
#mainContent {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── Pages ───────────────────────────────────────────── */
.page { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.page.active { display: flex; }

/* ── Chat page (preserved) ───────────────────────────── */
#header {
  background: #16213e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #2d2d44;
  flex-shrink: 0;
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
}
#sessionSelect {
  background: #2d2d44;
  color: #fff;
  border: 1px solid #3d3d5c;
  border-radius: 8px;
  padding: 3px 8px;
  font-size: 13px;
  outline: none;
  cursor: pointer;
  max-width: 160px;
}
#sessionSelect option { background: #2d2d44; }
#connectionStatus {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}
.status-connected {
  background: rgba(68, 255, 68, 0.15);
  color: #44ff44;
}
.status-disconnected {
  background: rgba(255, 68, 68, 0.15);
  color: #ff4444;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#messages::-webkit-scrollbar { width: 5px; }
#messages::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }
#messages::-webkit-scrollbar-track { background: transparent; }

.msg {
  display: flex;
  flex-direction: column;
  max-width: 80%;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg.user { align-self: flex-end; align-items: flex-end; }
.msg.agent { align-self: flex-start; align-items: flex-start; }

.agent-name {
  font-size: 11px;
  color: #7eb8ff;
  margin-bottom: 2px;
  padding-left: 12px;
}
.bubble {
  padding: 9px 14px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.45;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.msg.user .bubble {
  background: #0084ff;
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.agent .bubble {
  background: #2d2d44;
  color: #fff;
  border-bottom-left-radius: 4px;
}
.bubble img {
  display: block;
  max-width: 280px;
  max-height: 200px;
  border-radius: 10px;
  margin-bottom: 4px;
  cursor: pointer;
}
.msg.agent .bubble { white-space: normal; }
.msg.agent .bubble pre {
  background: #0d0d1a;
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 13px;
  white-space: pre-wrap;
  margin: 6px 0;
}
.msg.agent .bubble code {
  background: rgba(255,255,255,0.1);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 13px;
}
.msg.agent .bubble pre code {
  background: none;
  padding: 0;
}
.msg.agent .bubble a {
  color: #7eb8ff;
  text-decoration: underline;
}
.msg.agent .bubble ul, .msg.agent .bubble ol {
  margin: 4px 0;
  padding-left: 20px;
}
.msg.agent .bubble li {
  margin: 2px 0;
}
.msg.agent .bubble p {
  margin: 4px 0;
}
.streaming-cursor::after {
  content: '\25CA';
  animation: blink 0.8s infinite;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}
.ts {
  font-size: 10px;
  color: #666;
  margin-top: 2px;
  padding: 0 12px;
}

#typingIndicator {
  display: none;
  align-self: flex-start;
  padding: 10px 16px;
  background: #2d2d44;
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  margin: 0 16px 4px;
  flex-shrink: 0;
}
#typingIndicator.visible { display: flex; gap: 4px; align-items: center; }
.dot {
  width: 6px; height: 6px;
  background: #888;
  border-radius: 50%;
  animation: bounce 1.4s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,60%,100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}

.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 14px;
}

#imagePreview {
  display: none;
  background: #16213e;
  padding: 6px 16px;
  border-top: 1px solid #2d2d44;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#imagePreview img { max-height: 60px; border-radius: 6px; }
.remove-preview {
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  border-radius: 50%;
  width: 20px; height: 20px;
  cursor: pointer;
  font-size: 12px;
  line-height: 20px;
  text-align: center;
}

#inputBar {
  background: #16213e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-top: 1px solid #2d2d44;
  flex-shrink: 0;
}
#uploadBtn {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  padding: 2px;
  opacity: 0.6;
  transition: opacity 0.2s;
}
#uploadBtn:hover { opacity: 1; }
#messageInput {
  flex: 1;
  background: #2d2d44;
  border: 1px solid #3d3d5c;
  border-radius: 20px;
  padding: 7px 14px;
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#messageInput:focus { border-color: #0084ff; }
#messageInput::placeholder { color: #666; }
#messageInput:disabled { opacity: 0.4; cursor: not-allowed; }
#sendBtn {
  background: #0084ff;
  border: none;
  border-radius: 50%;
  width: 34px; height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
#sendBtn:hover { background: #0073e6; }
#sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Dashboard page ──────────────────────────────────── */
.dash-header {
  background: #16213e;
  padding: 12px 16px;
  border-bottom: 1px solid #2d2d44;
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.dash-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.dash-scroll::-webkit-scrollbar { width: 5px; }
.dash-scroll::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }

.plugin-cards {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 16px;
}
.plugin-card {
  background: #16213e;
  border: 1px solid #2d2d44;
  border-radius: 10px;
  padding: 12px;
  min-width: 140px;
  flex: 1;
}
.plugin-card-header {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.connected { background: #44ff44; }
.status-dot.disconnected { background: #ff4444; }
.status-dot.reconnecting { background: #ffaa00; }
.status-dot.error { background: #ff4444; }
.plugin-card-name { font-size: 14px; font-weight: 600; }
.plugin-card-type { font-size: 11px; color: #888; }
.plugin-card-latency { font-size: 12px; color: #7eb8ff; margin-top: 2px; }
.plugin-card-uptime { font-size: 11px; color: #666; margin-top: 1px; }
.plugin-card-status-text { font-size: 11px; margin-top: 2px; }
.plugin-card-status-text.connected { color: #44ff44; }
.plugin-card-status-text.disconnected { color: #ff4444; }

.dash-section {
  background: #16213e;
  border: 1px solid #2d2d44;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.dash-section-title {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.dash-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
}
.dash-row-label { color: #888; }
.dash-row-value { color: #fff; }

/* Sparkline chart */
.sparkline {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 40px;
  margin-top: 6px;
}
.sparkline-bar {
  display: inline-block;
  width: 3px;
  background: #0084ff;
  border-radius: 1px;
  min-height: 2px;
  transition: height 0.2s;
}
.sparkline-stats {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: #888;
  margin-top: 4px;
}

/* ── Logs page ───────────────────────────────────────── */
.logs-header {
  background: #16213e;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #2d2d44;
  flex-shrink: 0;
}
.logs-title {
  font-size: 15px;
  font-weight: 600;
  white-space: nowrap;
}
.logs-filter {
  background: #2d2d44;
  color: #fff;
  border: 1px solid #3d3d5c;
  border-radius: 8px;
  padding: 3px 8px;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.logs-filter option { background: #2d2d44; }
.logs-search {
  flex: 1;
  background: #2d2d44;
  border: 1px solid #3d3d5c;
  border-radius: 8px;
  padding: 4px 10px;
  color: #fff;
  font-size: 12px;
  outline: none;
}
.logs-search::placeholder { color: #666; }

.logs-scroll {
  flex: 1;
  overflow-y: auto;
  font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
  font-size: 12px;
  line-height: 1.6;
}
.logs-scroll::-webkit-scrollbar { width: 5px; }
.logs-scroll::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }

.log-entry {
  padding: 2px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid rgba(45,45,68,0.3);
  cursor: pointer;
  transition: background 0.1s;
}
.log-entry:hover { background: rgba(255,255,255,0.03); }
.log-ts { color: #666; white-space: nowrap; flex-shrink: 0; }
.log-level { font-weight: 600; width: 40px; flex-shrink: 0; text-align: center; }
.log-level.INFO { color: #44ff44; }
.log-level.WARN { color: #ffaa00; }
.log-level.ERROR { color: #ff4444; }
.log-source { color: #7eb8ff; white-space: nowrap; flex-shrink: 0; }
.log-msg { color: #ccc; word-break: break-all; flex: 1; }

.logs-footer {
  background: #16213e;
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #2d2d44;
  font-size: 11px;
  color: #888;
  flex-shrink: 0;
}
.logs-footer-btn {
  background: #2d2d44;
  border: 1px solid #3d3d5c;
  color: #fff;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.logs-footer-btn:hover { background: #3d3d5c; }

/* ── Settings page ──────────────────────────────────── */
.settings-header {
  background: #16213e;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #2d2d44;
  font-size: 15px;
  font-weight: 600;
  flex-shrink: 0;
}
.settings-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.settings-scroll::-webkit-scrollbar { width: 5px; }
.settings-scroll::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }

.settings-section {
  background: #16213e;
  border: 1px solid #2d2d44;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 12px;
}
.settings-section-title {
  font-size: 12px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.settings-add-btn {
  background: #0084ff;
  border: none;
  color: #fff;
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-add-btn:hover { background: #0073e6; }

.plugin-list-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(45,45,68,0.3);
}
.plugin-list-item:last-child { border-bottom: none; }
.plugin-list-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.plugin-list-dot.active { background: #44ff44; }
.plugin-list-dot.inactive { background: #888; }
.plugin-list-info { flex: 1; min-width: 0; }
.plugin-list-name { font-size: 13px; font-weight: 600; }
.plugin-list-type { font-size: 11px; color: #888; }
.plugin-list-url { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.plugin-list-actions { display: flex; gap: 4px; flex-shrink: 0; }
.plugin-list-btn {
  background: #2d2d44;
  border: 1px solid #3d3d5c;
  color: #fff;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s;
}
.plugin-list-btn:hover { background: #3d3d5c; }
.plugin-list-btn.danger { color: #ff4444; }
.plugin-list-btn.danger:hover { background: #442222; }

.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
}
.settings-row-label { color: #888; }
.settings-select {
  background: #2d2d44;
  color: #fff;
  border: 1px solid #3d3d5c;
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 12px;
  outline: none;
  cursor: pointer;
}
.settings-checkbox {
  width: 16px; height: 16px;
  cursor: pointer;
  accent-color: #0084ff;
}
.settings-footer {
  background: #16213e;
  padding: 8px 16px;
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  border-top: 1px solid #2d2d44;
  flex-shrink: 0;
}
.settings-footer-btn {
  background: #0084ff;
  border: none;
  color: #fff;
  border-radius: 6px;
  padding: 5px 16px;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.settings-footer-btn:hover { background: #0073e6; }
.settings-footer-btn.secondary {
  background: #2d2d44;
  border: 1px solid #3d3d5c;
}
.settings-footer-btn.secondary:hover { background: #3d3d5c; }

/* Modal overlay */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal-box {
  background: #16213e;
  border: 1px solid #2d2d44;
  border-radius: 12px;
  padding: 16px;
  width: 320px;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}
.modal-field {
  margin-bottom: 10px;
}
.modal-field label {
  display: block;
  font-size: 11px;
  color: #888;
  margin-bottom: 3px;
}
.modal-field input, .modal-field select {
  width: 100%;
  background: #2d2d44;
  color: #fff;
  border: 1px solid #3d3d5c;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 13px;
  outline: none;
  box-sizing: border-box;
}
.modal-field input:focus, .modal-field select:focus { border-color: #0084ff; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 12px;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <button class="nav-btn active" data-page="chat" title="Chat">💬</button>
  <button class="nav-btn" data-page="dashboard" title="Dashboard">📊</button>
  <button class="nav-btn" data-page="logs" title="Logs">📋</button>
  <button class="nav-btn" data-page="settings" title="Settings" style="margin-top:auto;">⚙️</button>
</div>

<div id="mainContent">

  <!-- ── Chat Page ──────────────────────────────────── -->
  <div id="page-chat" class="page active">
    <div id="header">
      <span class="header-title">🤖 <span id="headerChat">Chat</span></span>
      <select id="sessionSelect"><option value="">main</option></select>
      <span id="connectionStatus" class="status-disconnected">Not connected</span>
    </div>

    <div id="messages">
      <div class="empty-state" id="emptyState">No messages yet</div>
    </div>

    <div id="typingIndicator">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div id="imagePreview">
      <img id="previewImg" src="">
      <button class="remove-preview" onclick="clearPreview()">✕</button>
    </div>

    <div id="inputBar">
      <button id="uploadBtn" title="Upload image">📎</button>
      <input type="text" id="messageInput" placeholder="Type a message..." disabled>
      <button id="sendBtn" disabled>▶</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>
  </div>

  <!-- ── Dashboard Page ─────────────────────────────── -->
  <div id="page-dashboard" class="page">
    <div class="dash-header">📊 Dashboard</div>
    <div class="dash-scroll">
      <div id="pluginCards" class="plugin-cards">
        <div class="empty-state" id="dashEmpty" style="padding:30px 0;">No plugins connected</div>
      </div>

      <div class="dash-section">
        <div class="dash-section-title">Node Information</div>
        <div class="dash-row"><span class="dash-row-label">Node</span><span class="dash-row-value" id="dashNodeName">—</span></div>
        <div class="dash-row"><span class="dash-row-label">Platform</span><span class="dash-row-value" id="dashPlatform">—</span></div>
        <div class="dash-row"><span class="dash-row-label">Uptime</span><span class="dash-row-value" id="dashUptime">—</span></div>
        <div class="dash-row"><span class="dash-row-label">Version</span><span class="dash-row-value" id="dashVersion">—</span></div>
      </div>

      <div class="dash-section">
        <div class="dash-section-title">Latency (last 30 samples)</div>
        <div id="sparkline" class="sparkline"></div>
        <div class="sparkline-stats">
          <span>avg: <span id="latencyAvg">—</span></span>
          <span>max: <span id="latencyMax">—</span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Settings Page ────────────────────────────────── -->
  <div id="page-settings" class="page">
    <div class="settings-header">
      <span>⚙️ Settings</span>
    </div>
    <div class="settings-scroll">
      <div class="settings-section">
        <div class="settings-section-title">
          <span>Plugins</span>
          <button class="settings-add-btn" id="addPluginBtn">+ Add New</button>
        </div>
        <div id="pluginList"><div class="empty-state" style="padding:12px 0;font-size:13px;">No plugins configured</div></div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title"><span>General</span></div>
        <div class="settings-row">
          <span class="settings-row-label">Language</span>
          <select id="settingsLang" class="settings-select">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="zh-tw">繁體中文</option>
            <option value="zh-cn">简体中文</option>
          </select>
        </div>
        <div class="settings-row">

<script>
var I18N = {
  en: {
    chat: "Chat", chat_send: "Send", chat_placeholder: "Type a message...",
    chat_empty: "No messages yet", chat_typing: "Typing...",
    chat_not_connected: "Not connected", chat_connected: "Connected",
    chat_upload: "Upload image", chat_session: "Session"
  },
  "zh-tw": {
    chat: "\u5C0D\u8A71", chat_send: "\u767C\u9001",
    chat_placeholder: "\u8F38\u5165\u8A0A\u606F...",
    chat_empty: "\u5C1A\u7121\u8A0A\u606F", chat_typing: "\u8F38\u5165\u4E2D...",
    chat_not_connected: "\u672A\u9023\u7DDA", chat_connected: "\u5DF2\u9023\u7DDA",
    chat_upload: "\u4E0A\u50B3\u5716\u7247", chat_session: "\u5DE5\u4F5C\u968E\u6BB5"
  },
  "zh-cn": {
    chat: "\u5BF9\u8BDD", chat_send: "\u53D1\u9001",
    chat_placeholder: "\u8F93\u5165\u6D88\u606F...",
    chat_empty: "\u6682\u65E0\u6D88\u606F", chat_typing: "\u8F93\u5165\u4E2D...",
    chat_not_connected: "\u672A\u8FDE\u63A5", chat_connected: "\u5DF2\u8FDE\u63A5",
    chat_upload: "\u4E0A\u4F20\u56FE\u7247", chat_session: "\u4F1A\u8BDD"
  }
};

var lang = "en";
var connected = false;
var attachment = null;
var currentPage = "chat";
var allLogEntries = [];
var logAutoScroll = true;

function t(k) {
  return (I18N[lang] && I18N[lang][k]) || I18N.en[k] || k;
}

function applyI18n() {
  document.getElementById("headerChat").textContent = t("chat");
  document.getElementById("messageInput").placeholder = t("chat_placeholder");
  document.getElementById("uploadBtn").title = t("chat_upload");
  var es = document.getElementById("emptyState");
  if (es) es.textContent = t("chat_empty");
  var st = document.getElementById("connectionStatus");
  st.textContent = connected ? t("chat_connected") : t("chat_not_connected");
}

// ── Navigation ──────────────────────────────────────────
function navigateTo(page) {
  currentPage = page;
  var pages = document.querySelectorAll(".page");
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove("active");
  var btns = document.querySelectorAll(".nav-btn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("active");

  var target = document.getElementById("page-" + page);
  if (target) target.classList.add("active");
  var btn = document.querySelector('.nav-btn[data-page="' + page + '"]');
  if (btn) btn.classList.add("active");

  window.ipc.postMessage(JSON.stringify({ type: "navigate", page: page }));
  if (page === "settings") {
    window.ipc.postMessage(JSON.stringify({ type: "getSettings" }));
  }
}

var navBtns = document.querySelectorAll(".nav-btn");
for (var i = 0; i < navBtns.length; i++) {
  navBtns[i].addEventListener("click", function() { navigateTo(this.dataset.page); });
}

// ── Chat functions (preserved) ──────────────────────────
function fmtTime(d) {
  var h = d.getHours(), m = d.getMinutes();
  var ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return h + ":" + (m < 10 ? "0" : "") + m + " " + ampm;
}

function scrollBottom() {
  var c = document.getElementById("messages");
  requestAnimationFrame(function() { c.scrollTop = c.scrollHeight; });
}

// ── Markdown renderer (vanilla JS, no external libs) ────
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMarkdown(text) {
  // Escape HTML first to prevent XSS
  var s = escapeHtml(text);

  // Code blocks: ```lang\n...\n```
  s = s.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var cls = lang ? ' class="language-' + lang + '"' : '';
    return '<pre><code' + cls + '>' + code + '</code></pre>';
  });
  // Code blocks without trailing newline
  s = s.replace(/```(\w*)([\s\S]*?)```/g, function(_, lang, code) {
    var cls = lang ? ' class="language-' + lang + '"' : '';
    return '<pre><code' + cls + '>' + code + '</code></pre>';
  });

  // Split by code blocks to avoid processing markdown inside them
  var parts = s.split(/(<pre><code[^>]*>[\s\S]*?<\/code><\/pre>)/g);
  for (var i = 0; i < parts.length; i++) {
    if (parts[i].indexOf('<pre><code') === 0) continue;
    var p = parts[i];

    // Inline code
    p = p.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    p = p.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    p = p.replace(/__(.+?)__/g, '<strong>$1</strong>');
    // Italic
    p = p.replace(/\*(.+?)\*/g, '<em>$1</em>');
    p = p.replace(/_(.+?)_/g, '<em>$1</em>');
    // Links
    p = p.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // Headings (render as bold, not actual headings — too big in chat)
    p = p.replace(/^### (.+)$/gm, '<strong>$1</strong>');
    p = p.replace(/^## (.+)$/gm, '<strong>$1</strong>');
    p = p.replace(/^# (.+)$/gm, '<strong>$1</strong>');
    // Unordered lists
    p = p.replace(/(?:^|\n)((?:[-*] .+\n?)+)/g, function(_, block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^[-*] /, '') + '</li>';
      }).join('');
      return '<ul>' + items + '</ul>';
    });
    // Ordered lists
    p = p.replace(/(?:^|\n)((?:\d+\. .+\n?)+)/g, function(_, block) {
      var items = block.trim().split('\n').map(function(line) {
        return '<li>' + line.replace(/^\d+\. /, '') + '</li>';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    // Paragraphs (double newline)
    p = p.replace(/\n\n+/g, '</p><p>');
    // Single newlines to <br>
    p = p.replace(/\n/g, '<br>');

    parts[i] = p;
  }
  return '<p>' + parts.join('') + '</p>';
}

// ── Streaming state ─────────────────────────────────────
var pendingStreams = {};

function streamStart(data) {
  var c = document.getElementById("messages");
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "none";

  var w = document.createElement("div");
  w.className = "msg agent";
  w.id = "stream-" + data.id;

  if (data.agentName) {
    var n = document.createElement("div");
    n.className = "agent-name";
    n.textContent = data.agentName;
    w.appendChild(n);
  }

  var b = document.createElement("div");
  b.className = "bubble streaming-cursor";
  b.setAttribute("data-raw", "");
  w.appendChild(b);

  c.appendChild(w);
  pendingStreams[data.id] = { el: w, raw: "" };
  scrollBottom();
}

function streamChunk(data) {
  var ps = pendingStreams[data.id];
  if (!ps) return;
  ps.raw += data.text;
  var b = ps.el.querySelector(".bubble");
  if (b) {
    b.setAttribute("data-raw", ps.raw);
    b.textContent = ps.raw;
  }
  scrollBottom();
}

function streamEnd(data) {
  var ps = pendingStreams[data.id];
  if (!ps) return;
  var b = ps.el.querySelector(".bubble");
  if (b) {
    b.classList.remove("streaming-cursor");
    b.innerHTML = renderMarkdown(ps.raw);
  }
  // Add timestamp
  var ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = fmtTime(new Date());
  ps.el.appendChild(ts);
  delete pendingStreams[data.id];
  scrollBottom();
}

function addMessage(m) {
  var c = document.getElementById("messages");
  var es = document.getElementById("emptyState");
  if (es) es.style.display = "none";

  var w = document.createElement("div");
  w.className = "msg " + (m.sender === "user" ? "user" : "agent");

  if (m.sender === "agent" && m.agentName) {
    var n = document.createElement("div");
    n.className = "agent-name";
    n.textContent = m.agentName;
    w.appendChild(n);
  }

  var b = document.createElement("div");
  b.className = "bubble";

  if (m.imageUrl) {
    var img = document.createElement("img");
    img.src = m.imageUrl;
    b.appendChild(img);
  }
  if (m.text) {
    if (m.sender === "agent") {
      b.innerHTML += renderMarkdown(m.text);
    } else {
      var txt = document.createElement("span");
      txt.textContent = m.text;
      b.appendChild(txt);
    }
  }
  w.appendChild(b);

  var ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = fmtTime(new Date());
  w.appendChild(ts);

  c.appendChild(w);
  scrollBottom();
}

function setConnected(v) {
  connected = v;
  var st = document.getElementById("connectionStatus");
  var inp = document.getElementById("messageInput");
  if (v) {
    st.textContent = t("chat_connected");
    st.className = "status-connected";
    inp.disabled = false;
  } else {
    st.textContent = t("chat_not_connected");
    st.className = "status-disconnected";
    inp.disabled = true;
  }
  updateSend();
}

function setSessions(list) {
  var sel = document.getElementById("sessionSelect");
  var cur = sel.value;
  sel.innerHTML = '<option value="">main</option>';
  for (var i = 0; i < list.length; i++) {
    var o = document.createElement("option");
    o.value = list[i].key;
    o.textContent = list[i].name;
    sel.appendChild(o);
  }
  if (cur) sel.value = cur;
}

function setTyping(v) {
  var el = document.getElementById("typingIndicator");
  if (v) { el.classList.add("visible"); scrollBottom(); }
  else el.classList.remove("visible");
}

function updateSend() {
  var inp = document.getElementById("messageInput");
  document.getElementById("sendBtn").disabled =
    !connected || (!inp.value.trim() && !attachment);
}

function clearPreview() {
  attachment = null;
  document.getElementById("imagePreview").style.display = "none";
  document.getElementById("previewImg").src = "";
  updateSend();
}

function sendMsg() {
  var inp = document.getElementById("messageInput");
  var text = inp.value.trim();
  if (!text && !attachment) return;
  if (!connected) return;

  var msg = { type: "send", message: text,
    sessionKey: document.getElementById("sessionSelect").value || null };
  if (attachment) msg.attachments = [attachment];

  window.ipc.postMessage(JSON.stringify(msg));

  var display = { sender: "user", text: text };
  if (attachment) {
    display.imageUrl = "data:" + attachment.mimeType + ";base64," + attachment.data;
  }
  addMessage(display);

  inp.value = "";
  clearPreview();
  setTyping(true);
  updateSend();
}

function handleFile(f) {
  if (!f || !f.type.startsWith("image/")) return;
  var r = new FileReader();
  r.onload = function(e) {
    var b64 = e.target.result.split(",")[1];
    attachment = { data: b64, filename: f.name, mimeType: f.type };
    document.getElementById("previewImg").src = e.target.result;
    document.getElementById("imagePreview").style.display = "flex";
    updateSend();
  };
  r.readAsDataURL(f);
}

// ── Dashboard functions ─────────────────────────────────
function fmtUptime(secs) {
  if (!secs && secs !== 0) return "—";
  var h = Math.floor(secs / 3600);
  var m = Math.floor((secs % 3600) / 60);
  if (h > 0) return h + "h " + m + "m";
  return m + "m";
}

function updateDashboard(data) {
  if (!data) return;

  // Plugin cards
  var container = document.getElementById("pluginCards");
  var dashEmpty = document.getElementById("dashEmpty");
  if (data.plugins && data.plugins.length > 0) {
    if (dashEmpty) dashEmpty.style.display = "none";
    container.innerHTML = "";
    for (var i = 0; i < data.plugins.length; i++) {
      var p = data.plugins[i];
      var card = document.createElement("div");
      card.className = "plugin-card";
      card.innerHTML =
        '<div class="plugin-card-header">' +
          '<span class="status-dot ' + (p.status || 'disconnected') + '"></span>' +
          '<span class="plugin-card-name">' + escHtml(p.icon + ' ' + p.name) + '</span>' +
        '</div>' +
        '<div class="plugin-card-type">' + escHtml(p.plugin_type) + '</div>' +
        (p.latency_ms != null ? '<div class="plugin-card-latency">' + p.latency_ms + 'ms</div>' : '') +
        (p.uptime_secs != null ? '<div class="plugin-card-uptime">\u2191 ' + fmtUptime(p.uptime_secs) + '</div>' : '') +
        '<div class="plugin-card-status-text ' + (p.status || 'disconnected') + '">' +
          (p.status === 'connected' ? 'Connected' : p.status === 'reconnecting' ? 'Reconnecting...' : 'Disconnected') +
        '</div>';
      container.appendChild(card);
    }
  } else {
    if (dashEmpty) dashEmpty.style.display = "flex";
  }

  // Node info
  document.getElementById("dashNodeName").textContent = data.node_name || "—";
  document.getElementById("dashPlatform").textContent = data.platform || "—";
  document.getElementById("dashUptime").textContent = fmtUptime(data.uptime_secs);
  document.getElementById("dashVersion").textContent = data.version || "—";

  // Sparkline
  var sparkEl = document.getElementById("sparkline");
  var history = data.latency_history || [];
  if (history.length > 0) {
    var maxVal = Math.max.apply(null, history) || 1;
    sparkEl.innerHTML = "";
    for (var j = 0; j < history.length; j++) {
      var bar = document.createElement("span");
      bar.className = "sparkline-bar";
      bar.style.height = Math.max(2, (history[j] / maxVal) * 36) + "px";
      bar.title = history[j] + "ms";
      sparkEl.appendChild(bar);
    }
    var sum = 0;
    for (var k = 0; k < history.length; k++) sum += history[k];
    document.getElementById("latencyAvg").textContent = Math.round(sum / history.length) + "ms";
    document.getElementById("latencyMax").textContent = Math.max.apply(null, history) + "ms";
  }
}

// ── Logs functions ──────────────────────────────────────
function escHtml(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function updateLogs(entries) {
  if (!entries) return;
  allLogEntries = entries;
  renderLogs();
}

function renderLogs() {
  var container = document.getElementById("logEntries");
  var levelFilter = document.getElementById("logLevelFilter").value;
  var search = document.getElementById("logSearch").value.toLowerCase();

  var filtered = allLogEntries.filter(function(e) {
    if (levelFilter && e.level !== levelFilter) return false;
    if (search && e.message.toLowerCase().indexOf(search) === -1 &&
        e.source.toLowerCase().indexOf(search) === -1) return false;
    return true;
  });

  // Check if user has scrolled up
  var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 30;

  container.innerHTML = "";
  for (var i = 0; i < filtered.length; i++) {
    var e = filtered[i];
    var row = document.createElement("div");
    row.className = "log-entry";
    row.setAttribute("data-idx", i);
    row.innerHTML =
      '<span class="log-ts">' + escHtml(e.timestamp) + '</span>' +
      '<span class="log-level ' + escHtml(e.level) + '">' + escHtml(e.level) + '</span>' +
      '<span class="log-source">[' + escHtml(e.source) + ']</span>' +
      '<span class="log-msg">' + escHtml(e.message) + '</span>';
    row.addEventListener("click", (function(entry) {
      return function() { copyLogEntry(entry); };
    })(e));
    container.appendChild(row);
  }

  document.getElementById("logCount").textContent = filtered.length + " entries";

  // Auto-scroll if was at bottom
  if (wasAtBottom || logAutoScroll) {
    requestAnimationFrame(function() {
      container.scrollTop = container.scrollHeight;
    });
  }
}

function copyLogEntry(entry) {
  var text = entry.timestamp + " " + entry.level + " [" + entry.source + "] " + entry.message;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  }
}

// Log scroll detection: stop auto-scroll when user scrolls up
document.getElementById("logEntries").addEventListener("scroll", function() {
  var el = this;
  logAutoScroll = el.scrollHeight - el.scrollTop - el.clientHeight < 30;
});

document.getElementById("logLevelFilter").addEventListener("change", renderLogs);
document.getElementById("logSearch").addEventListener("input", renderLogs);

document.getElementById("logClearBtn").addEventListener("click", function() {
  allLogEntries = [];
  renderLogs();
  window.ipc.postMessage(JSON.stringify({ type: "clearLogs" }));
});

document.getElementById("logExportBtn").addEventListener("click", function() {
  var text = allLogEntries.map(function(e) {
    return e.timestamp + " " + e.level + " [" + e.source + "] " + e.message;
  }).join("\n");
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  }
});

// ── Settings functions ───────────────────────────────────
var settingsPlugins = [];
var settingsGeneral = { language: "auto", autoStart: false };

function updateSettings(data) {
  if (!data) return;
  if (data.plugins) settingsPlugins = data.plugins;
  if (data.general) settingsGeneral = data.general;
  renderPluginList();
  document.getElementById("settingsLang").value = settingsGeneral.language || "auto";
  document.getElementById("settingsAutoStart").checked = settingsGeneral.autoStart || false;
}

function renderPluginList() {
  var container = document.getElementById("pluginList");
  if (!settingsPlugins.length) {
    container.innerHTML = '<div class="empty-state" style="padding:12px 0;font-size:13px;">No plugins configured</div>';
    return;
  }
  container.innerHTML = "";
  for (var i = 0; i < settingsPlugins.length; i++) {
    var p = settingsPlugins[i];
    var row = document.createElement("div");
    row.className = "plugin-list-item";
    var displayUrl = p.webhookUrl || p.url || "";
    row.innerHTML =
      '<span class="plugin-list-dot ' + (i === 0 ? 'active' : 'inactive') + '"></span>' +
      '<div class="plugin-list-info">' +
        '<div class="plugin-list-name">' + escHtml(p.name) + ' <span class="plugin-list-type">(' + escHtml(p.type) + ')</span></div>' +
        '<div class="plugin-list-url">' + escHtml(displayUrl) + '</div>' +
      '</div>' +
      '<div class="plugin-list-actions">' +
        '<button class="plugin-list-btn" data-action="edit" data-idx="' + i + '">Edit</button>' +
        '<button class="plugin-list-btn danger" data-action="delete" data-idx="' + i + '">Del</button>' +
      '</div>';
    container.appendChild(row);
  }
  container.addEventListener("click", function(e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var idx = parseInt(btn.dataset.idx, 10);
    if (btn.dataset.action === "edit") openPluginModal(settingsPlugins[idx]);
    if (btn.dataset.action === "delete") deletePlugin(idx);
  });
}

function openPluginModal(existing) {
  var modal = document.getElementById("pluginModal");
  modal.classList.add("visible");
  document.getElementById("pluginModalTitle").textContent = existing ? "Edit Plugin" : "Add Plugin";
  document.getElementById("modalPluginType").value = (existing && existing.type) || "openclaw";
  document.getElementById("modalPluginName").value = (existing && existing.name) || "";
  document.getElementById("modalPluginUrl").value = (existing && existing.url) || "";
  document.getElementById("modalPluginToken").value = (existing && existing.token) || "";
  document.getElementById("modalPluginApiKey").value = (existing && existing.apiKey) || "";
  document.getElementById("modalPluginModel").value = (existing && existing.model) || "";
  document.getElementById("modalPluginWebhook").value = (existing && existing.webhookUrl) || "";
  document.getElementById("modalPluginPoll").value = (existing && existing.pollUrl) || "";
  document.getElementById("modalEditOriginalName").value = (existing && existing.name) || "";
  updateModalFields();
}

function updateModalFields() {
  var ptype = document.getElementById("modalPluginType").value;
  var show = function(id, v) { document.getElementById(id).style.display = v ? "block" : "none"; };
  show("modalUrlField", ptype !== "n8n");
  show("modalTokenField", ptype === "openclaw");
  show("modalApiKeyField", ptype === "openai-compatible");
  show("modalModelField", ptype === "ollama" || ptype === "openai-compatible");
  show("modalWebhookField", ptype === "n8n");
  show("modalPollField", ptype === "n8n");
}

document.getElementById("modalPluginType").addEventListener("change", updateModalFields);

function closePluginModal() {
  document.getElementById("pluginModal").classList.remove("visible");
}

function savePluginFromModal() {
  var name = document.getElementById("modalPluginName").value.trim();
  if (!name) return;
  var plugin = {
    type: document.getElementById("modalPluginType").value,
    name: name,
    url: document.getElementById("modalPluginUrl").value.trim() || null,
    token: document.getElementById("modalPluginToken").value.trim() || null,
    apiKey: document.getElementById("modalPluginApiKey").value.trim() || null,
    model: document.getElementById("modalPluginModel").value.trim() || null,
    webhookUrl: document.getElementById("modalPluginWebhook").value.trim() || null,
    pollUrl: document.getElementById("modalPluginPoll").value.trim() || null
  };

  // If editing and name changed, delete the old one
  var origName = document.getElementById("modalEditOriginalName").value;
  if (origName && origName !== name) {
    window.ipc.postMessage(JSON.stringify({ type: "deletePlugin", name: origName }));
  }

  window.ipc.postMessage(JSON.stringify({ type: "savePlugin", plugin: plugin }));

  // Update local state
  var found = false;
  for (var i = 0; i < settingsPlugins.length; i++) {
    if (settingsPlugins[i].name === (origName || name)) {
      settingsPlugins[i] = plugin;
      found = true;
      break;
    }
  }
  if (!found) settingsPlugins.push(plugin);
  renderPluginList();
  closePluginModal();
}

function deletePlugin(idx) {
  var p = settingsPlugins[idx];
  if (!p) return;
  window.ipc.postMessage(JSON.stringify({ type: "deletePlugin", name: p.name }));
  settingsPlugins.splice(idx, 1);
  renderPluginList();
}

document.getElementById("addPluginBtn").addEventListener("click", function() { openPluginModal(null); });
document.getElementById("modalCancelBtn").addEventListener("click", closePluginModal);
document.getElementById("modalSaveBtn").addEventListener("click", savePluginFromModal);
document.getElementById("pluginModal").addEventListener("click", function(e) {
  if (e.target === this) closePluginModal();
});

document.getElementById("settingsSaveAllBtn").addEventListener("click", function() {
  var general = {
    language: document.getElementById("settingsLang").value,
    autoStart: document.getElementById("settingsAutoStart").checked
  };
  window.ipc.postMessage(JSON.stringify({
    type: "saveGeneral",
    language: general.language,
    autoStart: general.autoStart
  }));
});

document.getElementById("settingsResetBtn").addEventListener("click", function() {
  window.ipc.postMessage(JSON.stringify({ type: "getSettings" }));
});

// ── Init ────────────────────────────────────────────────
function init(data) {
  lang = data.lang || "en";
  connected = data.connected || false;
  applyI18n();
  setConnected(connected);
  if (data.sessions && data.sessions.length) setSessions(data.sessions);
  if (data.selectedSession) document.getElementById("sessionSelect").value = data.selectedSession;
  if (data.messages && data.messages.length) {
    for (var i = 0; i < data.messages.length; i++) addMessage(data.messages[i]);
  }
  if (data.waitingForReply) setTyping(true);
  if (data.dashboard) updateDashboard(data.dashboard);
  if (data.logs && data.logs.length) updateLogs(data.logs);
  if (data.currentPage && data.currentPage !== "chat") navigateTo(data.currentPage);
}

// Chat events
document.getElementById("sendBtn").addEventListener("click", sendMsg);
document.getElementById("messageInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById("messageInput").addEventListener("input", updateSend);
document.getElementById("uploadBtn").addEventListener("click", function() {
  document.getElementById("fileInput").click();
});
document.getElementById("fileInput").addEventListener("change", function(e) {
  if (e.target.files.length) handleFile(e.target.files[0]);
  e.target.value = "";
});
document.getElementById("sessionSelect").addEventListener("change", function() {
  window.ipc.postMessage(JSON.stringify({
    type: "selectSession", sessionKey: this.value || null
  }));
});

// Drag & drop
var md = document.getElementById("messages");
md.addEventListener("dragover", function(e) { e.preventDefault(); });
md.addEventListener("drop", function(e) {
  e.preventDefault();
  if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

// Init from embedded data
var __INIT__ = "__INIT_DATA__";
if (typeof __INIT__ === "object") init(__INIT__);
</script>
</body>
